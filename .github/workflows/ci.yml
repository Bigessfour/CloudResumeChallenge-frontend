name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Validate Project
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Guard tracked secrets
        run: |
          if git ls-files | grep -qE '^(js/syncfusion-license\.js|\.env|syncfusion-license\.txt)$'; then
            echo "ERROR: Secret files must not be committed."
            git ls-files | grep -E '^(js/syncfusion-license\.js|\.env|syncfusion-license\.txt)$'
            exit 1
          fi
          echo "No tracked secret files."

      - name: Project structure and wiring
        run: |
          test -f index.html || (echo "index.html missing" && exit 1)
          test -f css/styles.css || (echo "css/styles.css missing" && exit 1)
          test -f js/app.js || (echo "js/app.js missing" && exit 1)
          grep -q 'css/styles.css' index.html || (echo "index.html must link css/styles.css" && exit 1)
          grep -q 'js/app.js' index.html || (echo "index.html must link js/app.js" && exit 1)
          grep -q 'ej2.min.js' index.html || (echo "index.html must reference Syncfusion CDN" && exit 1)
          echo "Structure checks passed."

      - name: Lint JavaScript
        run: npm run lint

      - name: Lint HTML
        run: npm run lint:html

      - name: Check formatting
        run: npm run format:check
