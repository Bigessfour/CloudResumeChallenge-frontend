name: Bug report
description: Report something broken on the site or in the dev workflow
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
  - type: input
    id: browser
    attributes:
      label: Browser / OS
      placeholder: "Chrome 120, Windows 11"
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. npm ci
        2. python -m http.server 8000
        3. ...
